<svg width="680" height="460" viewBox="0 0 680 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Mode Background -->
  <rect width="680" height="460" rx="16" fill="#030712"/>
  <rect x="1" y="1" width="678" height="458" rx="15" stroke="#1f2937" stroke-width="2"/>

  <!-- Grid Decoration -->
  <path d="M40 0V460M120 0V460M200 0V460M280 0V460M360 0V460M440 0V460M520 0V460M600 0V460" stroke="#111827" stroke-width="1"/>
  <path d="M0 40H680M0 120H680M0 200H680M0 280H680M0 360H680M0 440H680" stroke="#111827" stroke-width="1"/>

  <!-- Markers for Arrows -->
  <defs>
    <!-- Blue Arrow Marker (Client -> Server) -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6"/>
    </marker>
    <!-- Teal Arrow Marker (Server -> Client) -->
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#14b8a6"/>
    </marker>
    <!-- Gray Arrow Marker (Server <-> Redis) -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="32" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#f3f4f6" text-anchor="middle" letter-spacing="1">
    QUEUEDCURE SOCKET EVENT MAP
  </text>

  <!-- COLUMN 1: CLIENTS -->
  <!-- Receptionist Box -->
  <rect x="40" y="60" width="160" height="90" rx="12" fill="#1e1b4b" stroke="#4f46e5" stroke-width="2"/>
  <text x="120" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Receptionist</text>
  <text x="120" y="120" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#818cf8" text-anchor="middle">/receptionist</text>

  <!-- Display Box -->
  <rect x="40" y="180" width="160" height="90" rx="12" fill="#111827" stroke="#374151" stroke-width="2"/>
  <text x="120" y="220" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Waiting Room TV</text>
  <text x="120" y="240" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#9ca3af" text-anchor="middle">/display</text>

  <!-- Patient Box -->
  <rect x="40" y="300" width="160" height="90" rx="12" fill="#064e3b" stroke="#059669" stroke-width="2"/>
  <text x="120" y="340" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Patient Mobile</text>
  <text x="120" y="360" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#34d399" text-anchor="middle">/patient</text>


  <!-- COLUMN 2: EXPRESS / SOCKET.IO SERVER -->
  <rect x="300" y="150" width="160" height="150" rx="16" fill="#111827" stroke="#312e81" stroke-width="2"/>
  <text x="380" y="210" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">Socket.IO</text>
  <text x="380" y="230" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">Server</text>
  <text x="380" y="255" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6366f1" text-anchor="middle">Port 4000</text>


  <!-- COLUMN 3: REDIS DATABASE -->
  <rect x="540" y="180" width="100" height="90" rx="12" fill="#450a0a" stroke="#dc2626" stroke-width="2"/>
  <text x="590" y="225" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">Redis</text>
  <text x="590" y="245" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f87171" text-anchor="middle">atomic locking</text>


  <!-- EVENT ARROWS: CLIENT -> SERVER (BLUE) -->
  <!-- join-clinic (All Clients) -->
  <path d="M 200 90 L 320 150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="260" y="112" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#3b82f6" text-anchor="middle" transform="rotate(26.5 260 112)">join-clinic</text>

  <!-- add-patient / call-next / skip / undo (Receptionist) -->
  <path d="M 200 135 L 300 170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="250" y="145" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#3b82f6" text-anchor="middle" transform="rotate(19 250 145)">add-patient / call-next</text>


  <!-- EVENT ARROWS: SERVER -> CLIENT (TEAL) -->
  <!-- state-sync (On join) -->
  <path d="M 300 240 L 200 240" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrow-teal)" fill="none"/>
  <text x="250" y="233" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#14b8a6" text-anchor="middle">state-sync</text>

  <!-- queue-update (Broadcast) -->
  <path d="M 300 270 L 200 320" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrow-teal)" fill="none"/>
  <text x="250" y="303" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#14b8a6" text-anchor="middle" transform="rotate(-26.5 250 303)">queue-update</text>

  <!-- token-called (To Room) -->
  <path d="M 300 210 L 200 210" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrow-teal)" fill="none"/>
  <text x="250" y="203" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#14b8a6" text-anchor="middle">token-called</text>


  <!-- SERVER <-> REDIS ARROWS (GRAY) -->
  <!-- SET NX (Locking) & Get/Set State -->
  <path d="M 460 210 L 540 210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  <path d="M 540 240 L 460 240" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  <text x="500" y="203" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">SET NX</text>
  <text x="500" y="253" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">GET / SET</text>
</svg>
